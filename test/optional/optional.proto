syntax = "proto3";
package optional;

option go_package = "github.com/gravitational/protoc-gen-terraform/v3/test/optional";

// OptionalTest message contains proto3 optional fields and a real oneof to verify they are handled correctly.
message OptionalTest {

    // OptionalStr is a proto3 optional string field
    optional string OptionalStr = 2;

    // OptionalInt64 is a proto3 optional int64 field
    optional int64 OptionalInt64 = 3;

    // OptionalBool is a proto3 optional bool field
    optional bool OptionalBool = 4;

    // RealOneOf is a real oneof group
    oneof RealOneOf {
        string ChoiceA = 5;
        string ChoiceB = 6;
    }
}
