syntax = "proto3";

package types;

import "gogoproto/gogo.proto";

option (gogoproto.marshaler_all) = false;
option (gogoproto.unmarshaler_all) = false;
option (gogoproto.goproto_getters_all) = false;

// EnumValue is an enum field.
enum EnumValue {
  ENUM_UNSPECIFIED = 0;
  ENUM_VALUE_ONE = 1;
  ENUM_VALUE_TWO = 2;
}

// BoolValue wraps a bool so it can be used as a nullable message field.
message BoolValue {
  bool value = 1;
}

// Primitives contains primitive/scalar protobuf field types and list variants.
message Primitives {
  string id = 1;

  // string_value string field.
  string string_value = 2;

  // int32_value int32 field.
  int32 int32_value = 3;

  // int64_value int64 field.
  int64 int64_value = 4;

  // float_value float32 field.
  float float_value = 5;

  // double_value float64 field.
  double double_value = 6;

  // bool_value bool field.
  bool bool_value = 7;

  // bytes_value bytes field.
  bytes bytes_value = 8;

  // enum_value enum field.
  EnumValue enum_value = 9;

  // nullable_value is a message rather than primitive field so it can be set to
  // null in the config. Tests verify that null/not-null status is preserved.
  BoolValue nullable_value = 10 [ (gogoproto.nullable) = true ];

  // optional_string non-nullable because it's a primitive, but it will be set
  // as optional in the Terraform config, and therefore must also be set as
  // computed. The provider will return the string zero value ("") and tests
  // will verify both that value and that it's not marked as null in Terraform.
  string optional_string = 19;

  // string_list string list field.
  repeated string string_list = 11;

  // int32_list int32 list field.
  repeated int32 int32_list = 12;

  // int64_list int64 list field.
  repeated int64 int64_list = 13;

  // float_list float list field.
  repeated float float_list = 14;

  // double_list double list field.
  repeated double double_list = 15;

  // bool_list bool list field.
  repeated bool bool_list = 16;

  // bytes_list bytes list field.
  repeated bytes bytes_list = 17;

  // enum_list enum list field.
  repeated EnumValue enum_list = 18;
}
