---
types:
  - Test
duration_custom_type: Duration
use_state_for_unknown_by_default: true
sort: true
target_package_name: test
# default_package_name: test - since source and target package names equal, there's no need for this

exclude_fields:
  - Test.Excluded
computed_fields:
  - Test.Str
required_fields:
  - Test.Str
sensitive_fields:
  - Test.Str
suffixes:
  BoolCustom: BoolSpecial

name_overrides:
  Test.Str: "str"

time_type:
  type: "TimeType" # Struct name of attrs.Type
  value_type: "TimeValue" # Struct name of attrs.Value
  value_from_method: "ValueTime" # Method to get value from Terraform attribute
  value_to_method: "ValueTime" # Method to construct Terraform attribute from value
  null_value_method: "NullTime" # Method to get null value
  cast_to_type: "time.Time" # Go type of .Value
  cast_from_type: "time.Time" # Go type of an object field
  type_constructor: UseRFC3339Time()

duration_type:
  type: "DurationType" # Struct name of attrs.Type
  value_type: "DurationValue" # Struct name of attrs.Value
  value_from_method: "ValueDuration" # Method to get value from Terraform attribute
  value_to_method: "ValueDuration" # Method to construct Terraform attribute from value
  null_value_method: "NullDuration" # Method to get null value
  cast_to_type: "time.Duration" # Go type of .Value
  cast_from_type: "time.Duration" # Go type of an object field

injected_fields:
  Test:
    - name: id
      type: github.com/hashicorp/terraform-plugin-framework/types.StringType
      computed: true
      value_method: github.com/hashicorp/terraform-plugin-framework/types.StringUnknown

plan_modifiers:
  "Test.Str":
    - github.com/hashicorp/terraform-plugin-framework/resource.UseStateForUnknown()

validators:
  "Test.Str":
    - UseMockValidator()

custom_types:
  "Test.StringOverride": StringCustom
